name: Build AI.EXE (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 (GUI, remote providers)
    runs-on: windows-latest
    permissions:
      contents: write  # publish the build as a public GitHub Release

    steps:
      - name: Checkout AI.EXE
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # WebView2 SDK provides WebView2.h (so the GUI renders, not the fallback)
      # and WebView2Loader.dll (shipped next to the exe).
      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory packages -ExcludeVersion
          "WEBVIEW2_DIR=$PWD/packages/Microsoft.Web.WebView2" >> $env:GITHUB_ENV

      # Activate the MSVC toolchain (cl.exe/link.exe on PATH) so the build doesn't
      # depend on CMake's flaky "Visual Studio" generator auto-detection.
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python for bundled backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build AI.EXE GUI
        shell: cmd
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_BACKEND_STUB=OFF ^
            -DAI_EXE_WEBVIEW2_DIR="%WEBVIEW2_DIR%"
          cmake --build build --target ai_exe_gui

      - name: Bundle local adapter backend
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt selenium webdriver-manager pyinstaller
          python -m PyInstaller --noconfirm --clean --onedir --name "AI.EXE Backend" --paths backend --collect-all fastapi --collect-all uvicorn --collect-all pydantic --collect-all selenium --collect-all webdriver_manager --collect-all pypdf --add-data "backend/app/adapter_boot.py;app" --add-data "backend/app/venice_adapter_server.py;app" --add-data "backend/app/venice_config.py;app" backend/launcher.py

      - name: Assemble release
        shell: pwsh
        run: |
          $out = "release/AI.EXE"
          New-Item -ItemType Directory -Force "$out" | Out-Null

          # Main app, renamed to AI.EXE.exe (Ninja single-config: exe is in build/)
          Copy-Item "build/ai_exe_gui.exe" "$out/AI.EXE.exe"

          # UI files (HTML/CSS/JS + prompts + CodeMirror vendor) copied by CMake post-build
          if (Test-Path "build/ui") {
            Copy-Item -Recurse "build/ui" "$out/ui"
          }
          Copy-Item -Recurse "dist/AI.EXE Backend" "$out/backend"

          if (-not (Test-Path "$out/backend/AI.EXE Backend.exe")) {
            throw "Bundled AI.EXE backend is missing"
          }

          # WebView2 loader next to the exe so it renders without a separate SDK install.
          # The end user still needs the (near-ubiquitous) Evergreen WebView2 Runtime.
          Copy-Item "$env:WEBVIEW2_DIR/build/native/x64/WebView2Loader.dll" "$out/WebView2Loader.dll"

          Write-Host "Release assembled at: $out"
          Get-ChildItem -Recurse "$out" | Format-Table FullName, Length

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: AI.EXE-Windows
          path: release/AI.EXE/
          compression-level: 9
          retention-days: 30

      # Publish the build as a public GitHub Release so the in-app updater (and the
      # client) can download the latest version over the internet without a login.
      # One release per version tag; re-pushes of the same version refresh the asset.
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = (Select-String -Path CMakeLists.txt -Pattern 'AI_EXE_APP_VERSION "([0-9.]+)"').Matches[0].Groups[1].Value
          $tag = "v$ver"
          Compress-Archive -Path release/AI.EXE/* -DestinationPath "AI.EXE-Windows.zip" -Force
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "AI.EXE-Windows.zip" --clobber
          } else {
            gh release create $tag "AI.EXE-Windows.zip" --title "AI.EXE $tag" --notes "Automated build of AI.EXE $tag."
          }
