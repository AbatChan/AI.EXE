name: Build AI.EXE (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64 (GUI, remote providers)
    runs-on: windows-latest
    permissions:
      contents: write  # publish the build as a public GitHub Release

    steps:
      - name: Checkout AI.EXE
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # WebView2 SDK provides WebView2.h (so the GUI renders, not the fallback)
      # and WebView2Loader.dll (shipped next to the exe).
      - name: Install WebView2 SDK
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory packages -ExcludeVersion
          "WEBVIEW2_DIR=$PWD/packages/Microsoft.Web.WebView2" >> $env:GITHUB_ENV

      # Activate the MSVC toolchain (cl.exe/link.exe on PATH) so the build doesn't
      # depend on CMake's flaky "Visual Studio" generator auto-detection.
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python for bundled backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build AI.EXE GUI
        shell: cmd
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_BACKEND_STUB=OFF ^
            -DAI_EXE_WEBVIEW2_DIR="%WEBVIEW2_DIR%"
          cmake --build build --target ai_exe_gui

      - name: Bundle local adapter backend
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt selenium webdriver-manager flask gevent pyinstaller
          # Guard: os.kill(pid, 0) is a POSIX-only probe; on Windows it self-terminates.
          python backend/tools/check_parent_watch.py
          python -m PyInstaller --noconfirm --clean --onedir --name "AI.EXE Backend" --paths backend --collect-all fastapi --collect-all uvicorn --collect-all pydantic --collect-all selenium --collect-all webdriver_manager --collect-all pypdf --collect-all flask --collect-all gevent --collect-all greenlet --add-data "backend/app/adapter_boot.py;app" --add-data "backend/app/venice_adapter_server.py;app" --add-data "backend/app/venice_config.py;app" backend/launcher.py

      - name: Smoke-test bundled backend
        shell: pwsh
        run: |
          $env:AIEXE_BACKEND_PORT = "18765"
          $backend = (Resolve-Path "dist/AI.EXE Backend/AI.EXE Backend.exe").Path
          # Prove the adapter's runtime deps (flask/gevent/selenium) are frozen in —
          # they're only imported when the adapter launches, so boot alone won't catch it.
          $sc = & $backend "--adapter-selfcheck" 2>&1
          if ($LASTEXITCODE -ne 0) { throw "adapter-selfcheck failed: $sc" }
          Write-Host $sc
          $proc = Start-Process -FilePath $backend -ArgumentList "--serve" -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            1..50 | ForEach-Object {
              Start-Sleep -Milliseconds 500
              try {
                $res = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:18765/health"
                if ($res.StatusCode -eq 200) { $ready = $true; break }
              } catch { }
            }
            if (-not $ready) {
              $log = Join-Path $env:LOCALAPPDATA "AI_EXE/backend/backend.log"
              if (Test-Path $log) { Get-Content $log -Tail 200 }
              throw "Bundled AI.EXE backend did not become healthy"
            }
            # Survive the parent-watch interval: a Windows os.kill(pid,0) regression
            # would suicide the backend ~2s after boot, so re-check past that window.
            Start-Sleep -Seconds 6
            if ($proc.HasExited) {
              $log = Join-Path $env:LOCALAPPDATA "AI_EXE/backend/backend.log"
              if (Test-Path $log) { Get-Content $log -Tail 200 }
              throw "Bundled AI.EXE backend exited after boot (parent-watch regression?)"
            }
            try {
              $res = Invoke-WebRequest -UseBasicParsing "http://127.0.0.1:18765/health"
              if ($res.StatusCode -ne 200) { throw "unhealthy: $($res.StatusCode)" }
            } catch {
              $log = Join-Path $env:LOCALAPPDATA "AI_EXE/backend/backend.log"
              if (Test-Path $log) { Get-Content $log -Tail 200 }
              throw "Bundled AI.EXE backend stopped serving after boot: $_"
            }
            # The frozen backend must install the adapter from BUNDLED files with no
            # git/python on the box. This proves PyInstaller shipped the adapter source
            # and that __file__ resolves when frozen (client had no git -> WinError 2).
            try {
              $inst = Invoke-WebRequest -UseBasicParsing -Method POST "http://127.0.0.1:18765/api/adapter/install"
              $body = $inst.Content | ConvertFrom-Json
              if (-not $body.ok) { throw "install not ok: $($inst.Content)" }
            } catch {
              $log = Join-Path $env:LOCALAPPDATA "AI_EXE/backend/backend.log"
              if (Test-Path $log) { Get-Content $log -Tail 200 }
              throw "Bundled AI.EXE adapter install failed (missing bundled server / needs git?): $_"
            }
          } finally {
            if (-not $proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          }

      - name: Assemble release
        shell: pwsh
        run: |
          $out = "release/AI.EXE"
          New-Item -ItemType Directory -Force "$out" | Out-Null

          # Main app, renamed to AI.EXE.exe (Ninja single-config: exe is in build/)
          Copy-Item "build/ai_exe_gui.exe" "$out/AI.EXE.exe"

          # UI files (HTML/CSS/JS + prompts + CodeMirror vendor) copied by CMake post-build
          if (Test-Path "build/ui") {
            Copy-Item -Recurse "build/ui" "$out/ui"
          }
          Copy-Item -Recurse "dist/AI.EXE Backend" "$out/backend"

          if (-not (Test-Path "$out/backend/AI.EXE Backend.exe")) {
            throw "Bundled AI.EXE backend is missing"
          }

          # WebView2 loader next to the exe so it renders without a separate SDK install.
          # The end user still needs the (near-ubiquitous) Evergreen WebView2 Runtime.
          Copy-Item "$env:WEBVIEW2_DIR/build/native/x64/WebView2Loader.dll" "$out/WebView2Loader.dll"

          Write-Host "Release assembled at: $out"
          Get-ChildItem -Recurse "$out" | Format-Table FullName, Length

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: AI.EXE-Windows
          path: release/AI.EXE/
          compression-level: 9
          retention-days: 30

      # Publish the build as a public GitHub Release so the in-app updater (and the
      # client) can download the latest version over the internet without a login.
      # One release per version tag; re-pushes of the same version refresh the asset.
      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = (Select-String -Path CMakeLists.txt -Pattern 'AI_EXE_APP_VERSION "([0-9.]+)"').Matches[0].Groups[1].Value
          $tag = "v$ver"
          Compress-Archive -Path release/AI.EXE/* -DestinationPath "AI.EXE-Windows.zip" -Force
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag "AI.EXE-Windows.zip" --clobber
          } else {
            gh release create $tag "AI.EXE-Windows.zip" --title "AI.EXE $tag" --notes "Automated build of AI.EXE $tag."
          }
